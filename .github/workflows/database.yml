name: Database compatibility

on:
  workflow_dispatch:
  push:
    paths:
      - "database/**"
      - "mta/docker-compose.database.yml"
      - ".github/workflows/database.yml"
  pull_request:
    paths:
      - "database/**"
      - "mta/docker-compose.database.yml"
      - ".github/workflows/database.yml"

jobs:
  import:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:5.7.44
        env:
          MYSQL_ROOT_PASSWORD: mrucznik-root
          MYSQL_DATABASE: mrucznik
          MYSQL_USER: samp
          MYSQL_PASSWORD: funia
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pmrucznik-root"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false
      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes mysql-client
      - name: Import tables, routines, views and seed data
        env:
          MYSQL_PWD: mrucznik-root
        run: |
          for file in database/schema/*.sql; do
            case "$(basename "$file")" in view_*) continue ;; esac
            mysql --protocol=TCP -h127.0.0.1 -uroot mrucznik < "$file"
          done
          mysql --protocol=TCP -h127.0.0.1 -uroot < database/routines.sql
          for file in database/schema/view_*.sql; do
            mysql --protocol=TCP -h127.0.0.1 -uroot mrucznik < "$file"
          done
          for file in database/data/*.sql; do
            mysql --protocol=TCP -h127.0.0.1 -uroot mrucznik < "$file"
          done
      - name: Verify imported contract
        env:
          MYSQL_PWD: mrucznik-root
        run: |
          objects=$(mysql --protocol=TCP -h127.0.0.1 -uroot -Nse \
            "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='mrucznik'")
          routines=$(mysql --protocol=TCP -h127.0.0.1 -uroot -Nse \
            "SELECT COUNT(*) FROM information_schema.routines WHERE routine_schema='mrucznik'")
          echo "Imported objects: $objects; routines: $routines"
          test "$objects" -eq 43
          test "$routines" -eq 31
          mysql --protocol=TCP -h127.0.0.1 -usamp -pfunia -Nse \
            "SELECT COUNT(*) FROM mrucznik.mru_config"
