name: Build gamemode without Vice City

on:
  workflow_dispatch:
  push:
    paths:
      - "gamemodes/**"
      - "include/**"
      - ".github/workflows/build-gamemode-no-vicecity.yml"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Install pinned sampctl
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/Southclaws/sampctl/releases/download/1.14.0/sampctl_1.14.0_linux_amd64.tar.gz \
            --output "$RUNNER_TEMP/sampctl.tar.gz"
          echo "62b5cd18f1969168f147b3e9595c300b902622b4a547b5dbd1b99c49dab8544d  $RUNNER_TEMP/sampctl.tar.gz" | sha256sum --check
          tar -xzf "$RUNNER_TEMP/sampctl.tar.gz" -C "$RUNNER_TEMP"

      - name: Compile Mrucznik RP with Vice City disabled
        run: |
          "$RUNNER_TEMP/sampctl" package ensure
          "$RUNNER_TEMP/sampctl" package build
          mv gamemodes/Mrucznik-RP.amx "$RUNNER_TEMP/Mrucznik-RP-no-vicecity.amx"
          test -s "$RUNNER_TEMP/Mrucznik-RP-no-vicecity.amx"

      - uses: actions/upload-artifact@v4
        with:
          name: mrucznik-rp-gamemode-no-vicecity
          path: ${{ runner.temp }}/Mrucznik-RP-no-vicecity.amx
          if-no-files-found: error
