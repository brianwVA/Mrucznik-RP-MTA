name: Diagnose MTA Linux x86 engine

on:
  workflow_dispatch:
  push:
    branches:
      - codex/mta-port
    paths:
      - .github/workflows/diagnose-mta-x86.yml

permissions:
  contents: read

jobs:
  loader:
    runs-on: ubuntu-22.04
    steps:
      - name: Install 32-bit runtime
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install --yes libc6:i386 file gdb patchelf

      - name: Download ServerProject engine files
        env:
          BASE_URL: https://github.com/brianwVA/Mrucznik-RP-MTA/releases/download/v2.8.8-mta-serverproject-linux-x86
        run: |
          curl --fail --location --retry 3 --output mta-server "$BASE_URL/mta-server"
          curl --fail --location --retry 3 --output core.so "$BASE_URL/core-original.so"
          curl --fail --location --retry 3 --output net.so "$BASE_URL/net.so"
          curl --fail --location --retry 3 --output xmll.so "$BASE_URL/xmll.so"
          curl --fail --location --retry 3 --output libncursesw.so.5 "$BASE_URL/libncursesw.so.5"
          curl --fail --location --retry 3 --output libtinfo.so.5 "$BASE_URL/libtinfo.so.5"
          curl --fail --location --retry 3 --output libz.so.1 "$BASE_URL/libz.so.1"
          mkdir -p \
            mods/deathmatch/backups \
            mods/deathmatch/databases \
            mods/deathmatch/databases/system \
            mods/deathmatch/dumps \
            mods/deathmatch/logs \
            mods/deathmatch/resource-cache \
            mods/deathmatch/resources
          curl --fail --location --retry 3 --output mods/deathmatch/deathmatch.so "$BASE_URL/deathmatch.so"
          curl --fail --location --retry 3 --output mods/deathmatch/libmta-lua-bridge.so "$BASE_URL/libmta-lua-bridge.so"
          curl --fail --location --retry 3 --output mods/deathmatch/liblua5.1-mta-x86.so "$BASE_URL/liblua5.1-mta-x86.so"
          curl --fail --location --retry 3 --output mods/deathmatch/dbconmy.so "$BASE_URL/dbconmy.so"
          curl --fail --location --retry 3 \
            --output mods/deathmatch/acl.xml \
            https://raw.githubusercontent.com/multitheftauto/mtasa-blue/v1.5.9/Server/mods/deathmatch/acl.xml
          curl --fail --location --retry 3 \
            --output mods/deathmatch/vehiclecolors.conf \
            https://raw.githubusercontent.com/multitheftauto/mtasa-blue/v1.5.9/Server/mods/deathmatch/vehiclecolors.conf
          python3 - <<'PY'
          import sqlite3

          database = sqlite3.connect("mods/deathmatch/databases/system/fileblock.db")
          database.execute("CREATE TABLE block_reasons (hash TEXT, reason TEXT)")
          database.commit()
          database.close()
          PY
          chmod +x mta-server

      - name: Inspect and execute engine
        run: |
          export LD_LIBRARY_PATH="$PWD:$PWD/mods/deathmatch"
          python3 - <<'PY'
          from pathlib import Path

          path = Path("mods/deathmatch/deathmatch.so")
          data = bytearray(path.read_bytes())

          # Replace the legacy C++ directory builder with a small ABI-neutral
          # mkdir -p loop. The original std::vector/SString implementation
          # corrupts memory with the host's modern libstdc++ runtime.
          mkdir_offset = 0x136EA4
          mkdir_legacy = bytes.fromhex(
              "c389e557e8b0d2000081c753319a00568d75b45381ecd400000065a114000000"
              "8945e431c0ff750856c78550ffffff00000000c78554ffffff00000000c78558"
              "ffffff0000000089b538ffffffe8aa13ffff8d45cc8d9550ffffff6a00b92f000000"
          )
          mkdir_original = bytes.fromhex("55") + mkdir_legacy[1:]
          mkdir_replacement = bytes.fromhex(
              "5589e55356578b45088b0050e80b7df6ff83c40485c00f844100000089c689c7"
              "8a0784c00f842a0000003c2f0f851c00000039f70f8414000000c6070068fd01"
              "000056e80479f6ff83c408c6072f47e9ccffffff56e882a1f6ff83c4045f5e5bc9c3"
          )
          current = bytes(data[mkdir_offset : mkdir_offset + len(mkdir_replacement)])
          if current not in (mkdir_legacy, mkdir_original, mkdir_replacement):
              raise SystemExit(f"unexpected MakeSureDirExists bytes: {current.hex()}")
          data[mkdir_offset : mkdir_offset + len(mkdir_replacement)] = mkdir_replacement

          patches = (
              (0x1619A4, bytes.fromhex("b801000000c3"), bytes.fromhex("5589e55756e8")),
              (
                  0x127E50,
                  bytes.fromhex("83ec6c65a1140000008944246031c08d442408508b442478ff306a03e8dfa8f7ff83c41089c231c083faff74118b4424142500f000003d004000000f95"),
                  bytes.fromhex("5589e581ec800000008d5590528b450cff306a03e8e7a8f7ff83c40c83f8ff74158b45a02500f000003d004000000f95c00fb6c0eb0231c089ec5d5bc3"),
              ),
              (
                  0x127EC0,
                  bytes.fromhex("83ec6c65a1140000008944246031c08d442408508b442478ff306a03e86fa8f7ff83c41089c231c083faff74118b4424142500f000003d004000000f94"),
                  bytes.fromhex("5589e581ec800000008d5590528b450cff306a03e877a8f7ff83c40c83f8ff74158b45a02500f000003d004000000f94c00fb6c0eb0231c089ec5d5bc3"),
              ),
          )
          for offset, original, replacement in patches:
              current = bytes(data[offset : offset + len(original)])
              if current not in (original, replacement):
                  raise SystemExit(f"unexpected deathmatch.so bytes at 0x{offset:x}: {current.hex()}")
              data[offset : offset + len(replacement)] = replacement
          path.write_bytes(data)
          PY
          file mta-server core.so net.so xmll.so libncursesw.so.5 libtinfo.so.5 libz.so.1
          readelf -d core.so | grep -E 'NEEDED|RPATH|RUNPATH'
          readelf -d net.so | grep -E 'NEEDED|RPATH|RUNPATH'
          readelf -V libncursesw.so.5 | grep 'Name: GLIBC_' | sort -u
          ldd core.so
          ldd net.so
          ldd mods/deathmatch/deathmatch.so
          ldd mods/deathmatch/libmta-lua-bridge.so
          ldd mods/deathmatch/liblua5.1-mta-x86.so
          set +e
          version_output=$(./mta-server --version 2>&1)
          version_status=$?
          set -e
          echo "$version_output"
          test "$version_status" -eq 1
          grep -F 'MTA:SA Server v1.5.9-release-21630' <<<"$version_output"

      - name: Smoke-test complete engine
        run: |
          export LD_LIBRARY_PATH="$PWD:$PWD/mods/deathmatch"
          mkdir -p mods/deathmatch/resources/mrp_smoke
          cat > mods/deathmatch/resources/mrp_smoke/meta.xml <<'EOF'
          <meta>
            <info author="MRP" name="MRP runtime smoke test" type="script" />
            <script src="client.lua" type="client" />
          </meta>
          EOF
          cat > mods/deathmatch/resources/mrp_smoke/client.lua <<'EOF'
          outputDebugString("MRP runtime smoke test")
          EOF
          cat > mods/deathmatch/mtaserver.conf <<'EOF'
          <config>
            <servername>MRP x86 CI smoke test</servername>
            <serverip>auto</serverip>
            <serverport>22003</serverport>
            <maxplayers>4</maxplayers>
            <httpserver>0</httpserver>
            <httpport>22005</httpport>
            <ase>0</ase>
            <logfile>logs/server.log</logfile>
            <authfile>logs/server_auth.log</authfile>
            <dbfile>logs/db.log</dbfile>
            <acl>acl.xml</acl>
            <backup_interval>0</backup_interval>
          </config>
          EOF
          set +e
          timeout 15s ./mta-server --config mtaserver.conf > startup.log 2>&1
          startup_status=$?
          set -e
          cat startup.log
          if [ "$startup_status" -ne 124 ]; then
            timeout 20s gdb --quiet --batch \
              -ex 'set pagination off' \
              -ex 'set env LD_LIBRARY_PATH=.:./mods/deathmatch' \
              -ex run \
              -ex 'thread apply all bt full' \
              --args ./mta-server --config mtaserver.conf > gdb.log 2>&1 || true
            cat gdb.log
          fi
          test "$startup_status" -eq 124
          grep -F 'Server started and is ready to accept connections!' startup.log

      - name: Save patched runtime
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-patchelf
          path: |
            core.so
            net.so
            mods/deathmatch/deathmatch.so
            startup.log
            gdb.log
