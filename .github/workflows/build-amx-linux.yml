name: Build patched MTA AMX module Linux x86

on:
  workflow_dispatch:
  push:
    paths:
      - "mta/vendor/mta-amx/amx-deps/src/**"
      - "mta/build-amx-linux.sh"
      - ".github/workflows/build-amx-linux.yml"
  pull_request:
    paths:
      - "mta/vendor/mta-amx/amx-deps/src/**"
      - "mta/build-amx-linux.sh"
      - ".github/workflows/build-amx-linux.yml"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Fetch pinned streamer source
        run: |
          git init --quiet ./build/streamer
          git -C ./build/streamer fetch --quiet --depth 1 \
            https://github.com/samp-incognito/samp-streamer-plugin.git \
            6dad0a121d60613b25bd1ec9aa6ca38701da3270
          git -C ./build/streamer checkout --quiet FETCH_HEAD

      - name: Generate AMX module makefiles
        run: |
          work_dir=$(mktemp -d)
          curl --fail --location --silent --show-error \
            --output "$work_dir/premake.tar.gz" \
            https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-linux.tar.gz
          echo "63edd3e7461eebdd45b500a3c7e8ad4e7a67d68f230010f9a97cbb71b4ec59c8  $work_dir/premake.tar.gz" \
            | sha256sum --check --status
          tar -xzf "$work_dir/premake.tar.gz" -C "$work_dir"
          chmod 0755 "$work_dir/premake5"
          (
            cd ./mta/vendor/mta-amx/amx-deps/src
            "$work_dir/premake5" --file=premake5.lua gmake2
          )

      - name: Build patched AMX module for the legacy runtime
        run: |
          docker run --rm \
            --volume "$PWD:/workspace" \
            --workdir /workspace \
            debian:bullseye-slim \
            bash -ceu '
              dpkg --add-architecture i386
              apt-get update
              apt-get install --yes gcc-multilib g++-multilib make libboost-system-dev:i386 libeigen3-dev
              make -C ./mta/vendor/mta-amx/amx-deps/src/Build config=release_x86 -j"$(nproc)"
              mkdir -p ./artifacts/amx-linux-x86
              king_so=$(find ./mta/vendor/mta-amx/amx-deps/src -type f \( -name king.so -o -name libking.so \) -print -quit)
              test -n "$king_so"
              install -m 0755 "$king_so" ./artifacts/amx-linux-x86/king.so

              mapfile -t streamer_cpp < <(find ./build/streamer/src -name "*.cpp" -type f | sort)
              g++ -m32 -std=c++11 -O2 -fPIC -fno-strict-aliasing -shared \
                -DLINUX -DSUPPORTS_PROCESS_TICK=0x20000 -include cstddef \
                -DBOOST_CHRONO_HEADER_ONLY -DSAMPGDK_AMALGAMATION -DSAMPGDK_CPP_WRAPPERS \
                -I./build/streamer/src \
                -I./mta/vendor/colandreas/src/SDK \
                -I./mta/vendor/colandreas/src/SDK/amx \
                -I/usr/include/eigen3 \
                "${streamer_cpp[@]}" \
                ./build/streamer/src/sampgdk.c \
                ./mta/vendor/colandreas/src/SDK/amxplugin.cpp \
                -lboost_system -pthread -lrt \
                -o ./artifacts/amx-linux-x86/streamer.so
              strip ./artifacts/amx-linux-x86/streamer.so
            '

      - name: Build exact ColAndreas fork
        continue-on-error: true
        run: |
          "$VCPKG_INSTALLATION_ROOT/vcpkg" install bullet3:x86-linux
          cmake -S ./mta/vendor/colandreas -B ./build/colandreas-linux-x86 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x86-linux
          cmake --build ./build/colandreas-linux-x86 --config Release --parallel
          install -m 0755 ./build/colandreas-linux-x86/ColAndreas_static.so \
            ./artifacts/amx-linux-x86/ColAndreas_static.so

      - name: Verify artifact architecture
        run: |
          file ./artifacts/amx-linux-x86/king.so | grep -F "ELF 32-bit"
          file ./artifacts/amx-linux-x86/streamer.so | grep -F "ELF 32-bit"
          if [ -f ./artifacts/amx-linux-x86/ColAndreas_static.so ]; then
            file ./artifacts/amx-linux-x86/ColAndreas_static.so | grep -F "ELF 32-bit"
            ldd ./artifacts/amx-linux-x86/ColAndreas_static.so || true
          fi
          readelf -h ./artifacts/amx-linux-x86/king.so
          if readelf -V ./artifacts/amx-linux-x86/king.so | grep -Fq 'Name: GLIBC_2.34'; then
            echo 'king.so requires a newer glibc than the MTA 1.5.9 runtime' >&2
            exit 1
          fi
          if objdump -T ./artifacts/amx-linux-x86/king.so | grep 'UND' | grep -Eq '[[:space:]]amx_[A-Za-z0-9_]+'; then
            echo 'king.so still depends on AMX symbols exported only by MTA 1.6' >&2
            exit 1
          fi
          ldd ./artifacts/amx-linux-x86/king.so || true
          ldd ./artifacts/amx-linux-x86/streamer.so || true

      - uses: actions/upload-artifact@v4
        with:
          name: king-mrucznik-mta-amx-linux-x86
          path: |
            artifacts/amx-linux-x86/king.so
            artifacts/amx-linux-x86/streamer.so
            artifacts/amx-linux-x86/ColAndreas_static.so
          if-no-files-found: error
